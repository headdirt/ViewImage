name: CI

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'

    - name: Install Deps
      run: npm ci
    - name: Lint with ESLint
      run: npm run lint
    - name: Lint extension with web-ext
      run: npm run lint:extension
    - name: Check generated manifest
      run: |
        npm run manifest
        git diff --exit-code manifest.json
